<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRIME CINEMA</title>
    <!-- Официальный скрипт Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        :root {
            --bg-color: #080b11;
            --card-bg: rgba(23, 30, 46, 0.4);
            --card-border: rgba(255, 255, 255, 0.06);
            --text-main: #ffffff;
            --text-secondary: #94a3b8;
            --accent-gradient: linear-gradient(135deg, #ff416c, #ff4b2b);
            --blur-effect: blur(20px);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px 16px 80px 16px; /* Отступ снизу для таббара */
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 1px;
            margin: 0 0 4px 0;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header p {
            color: var(--text-secondary);
            font-size: 13px;
            margin: 0;
        }

        /* --- Табы и навигация --- */
        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .tab-content.active {
            display: block;
        }

        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(13, 18, 30, 0.8);
            backdrop-filter: var(--blur-effect);
            -webkit-backdrop-filter: var(--blur-effect);
            border-top: 1px solid var(--card-border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            padding: 8px 16px;
            cursor: pointer;
            transition: color 0.3s, transform 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tab-btn.active {
            color: #ff4b2b;
            font-weight: 700;
        }

        /* --- Вкладка Профиль --- */
        .profile-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: var(--blur-effect);
            -webkit-backdrop-filter: var(--blur-effect);
        }

        .profile-item {
            margin-bottom: 14px;
        }

        .profile-item:last-child {
            margin-bottom: 0;
        }

        .profile-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .profile-value {
            font-size: 16px;
            font-weight: 600;
        }

        /* --- Вкладка Каталог --- */
        .catalog {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .movie-card {
            background: var(--card-bg);
            backdrop-filter: var(--blur-effect);
            -webkit-backdrop-filter: var(--blur-effect);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .poster-placeholder {
            width: 100%;
            height: 130px;
            background: linear-gradient(135deg, #1e1b4b, #0f172a);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .poster-placeholder::before {
            content: '';
            position: absolute;
            width: 80px;
            height: 80px;
            background: #ff416c;
            filter: blur(40px);
            opacity: 0.5;
            border-radius: 50%;
        }

        .poster-title {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 8px;
            text-transform: uppercase;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            z-index: 1;
        }

        .movie-info {
            padding: 16px;
        }

        .movie-title {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .movie-desc {
            color: var(--text-secondary);
            font-size: 12px;
            line-height: 1.4;
            margin-bottom: 16px;
        }

        /* --- Лента серий с замками --- */
        .episode-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 16px;
        }

        .episode-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 12px 14px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }

        .episode-item:hover, .episode-item.selected {
            background: rgba(255, 65, 108, 0.08);
            border-color: rgba(255, 65, 108, 0.3);
        }

        .episode-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .episode-name {
            font-size: 13px;
            font-weight: 600;
        }

        .episode-price {
            font-size: 12px;
            color: #ff4b2b;
            font-weight: 500;
        }

        .lock-icon {
            font-size: 14px;
            opacity: 0.7;
            display: flex;
            align-items: center;
        }

        /* Кнопка действия */
        .buy-btn {
            width: 100%;
            padding: 13px;
            background: var(--accent-gradient);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            box-shadow: 0 4px 12px rgba(255, 65, 108, 0.2);
        }

        .buy-btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>PRIME CINEMA</h1>
        <p>Премиум доступ к релизам</p>
    </div>

    <!-- ВКЛАДКА: ПРОФИЛЬ -->
    <div id="tab-profile" class="tab-content">
        <div class="profile-card">
            <div class="profile-item">
                <div class="profile-label">Имя пользователя</div>
                <div class="profile-value" id="user-name">Загрузка...</div>
            </div>
            <div class="profile-item">
                <div class="profile-label">Telegram ID</div>
                <div class="profile-value" id="user-id">Загрузка...</div>
            </div>
        </div>
    </div>

    <!-- ВКЛАДКА: КАТАЛОГ -->
    <div id="tab-catalog" class="tab-content active">
        <div class="catalog">
            <div class="movie-card">
                <div class="poster-placeholder">
                    <div class="poster-title">Холод</div>
                </div> 
                
                <div class="movie-info">
                    <div class="movie-title">Сериал «Холод» (2026)</div>
                    <div class="movie-desc">Выберите интересующую серию или заберите весь сезон с максимальной выгодой.</div>
                    
                    <!-- Лента серий -->
                    <div class="episode-list">
                        <div class="episode-item" onclick="selectItem(this, 'Весь 1 сезон сериала Холод', '299 рублей')">
                            <div class="episode-info">
                                <div class="episode-name">🔥 Весь 1 сезон целиком</div>
                                <div class="episode-price">299 ₽</div>
                            </div>
                            <div class="lock-icon">🔒</div>
                        </div>
                        <div class="episode-item" onclick="selectItem(this, '1 серию сериала Холод', '99 рублей')">
                            <div class="episode-info">
                                <div class="episode-name">Серия 1</div>
                                <div class="episode-price">99 ₽</div>
                            </div>
                            <div class="lock-icon">🔒</div>
                        </div>
                        <div class="episode-item" onclick="selectItem(this, '2 серию сериала Холод', '99 рублей')">
                            <div class="episode-info">
                                <div class="episode-name">Серия 2</div>
                                <div class="episode-price">99 ₽</div>
                            </div>
                            <div class="lock-icon">🔒</div>
                        </div>
                        <div class="episode-item" onclick="selectItem(this, '3 серию сериала Холод', '99 рублей')">
                            <div class="episode-info">
                                <div class="episode-name">Серия 3</div>
                                <div class="episode-price">99 ₽</div>
                            </div>
                            <div class="lock-icon">🔒</div>
                        </div>
                    </div>
                    
                    <button class="buy-btn" onclick="processOrder()">Купить доступ</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Нижний таб-бар -->
    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('catalog', this)">
            <span>🎬</span>
            <span>Каталог</span>
        </button>
        <button class="tab-btn" onclick="switchTab('profile', this)">
            <span>👤</span>
            <span>Профиль</span>
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Подгружаем реальные данные из Telegram
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-name').innerText = user.first_name + (user.last_name ? ' ' + user.last_name : '') + (user.username ? ` (@${user.username})` : '');
            document.getElementById('user-id').innerText = user.id;
        } else {
            document.getElementById('user-name').innerText = 'Неизвестный пользователь';
            document.getElementById('user-id').innerText = '000000000';
        }

        // Логика переключения вкладок
        function switchTab(tabName, btnElement) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(`tab-${tabName}`).classList.add('active');
            btnElement.classList.add('active');
        }

        // Логика выбора позиции в ленте
        let selectedProduct = null;
        function selectItem(element, productName, price) {
            document.querySelectorAll('.episode-item').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            selectedProduct = { name: productName, price: price };
        }

        // Обработка клика по кнопке купить
        function processOrder() {
            if (!selectedProduct) {
                tg.showAlert('Пожалуйста, выберите серию или сезон из списка!');
                return;
            }

            tg.showPopup({
                title: 'Покупка доступа',
                message: `Для оплаты и получения доступа необходимо связаться с администратором.`,
                buttons: [
                    {id: 'contact', type: 'default', text: 'Связаться'},
                    {type: 'cancel', text: 'Отмена'}
                ]
            }, function(buttonId) {
                if (buttonId === 'contact') {
                    // Формируем красивый текст для админа
                    const textTemplate = `Здравствуйте, хочу приобрести ${selectedProduct.name} за ${selectedProduct.price}`;
                    const encodedText = encodeURIComponent(textTemplate);
                    
                    // Перенаправление с автозаполнением сообщения
                    tg.openTelegramLink(`https://t.me/sddo0120?text=${encodedText}`);
                    tg.close();
                }
            });
        }
    </script>
</body>
</html>
