<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRIME CINEMA</title>
    <!-- Официальный скрипт Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        :root {
            --bg-color: #080b11;
            --card-bg: rgba(23, 30, 46, 0.4);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-secondary: #94a3b8;
            --accent-gradient: linear-gradient(135deg, #ff416c, #ff4b2b);
            --blur-effect: blur(16px);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px 16px;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Аккуратная шапка */
        .header {
            text-align: center;
            margin-bottom: 24px;
            animation: fadeIn 0.8s ease;
        }
        
        h1 {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 1px;
            margin: 0 0 4px 0;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header p {
            color: var(--text-secondary);
            font-size: 13px;
            margin: 0;
            font-weight: 400;
        }

        .catalog {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Миниатюрная карточка с эффектом стекла */
        .movie-card {
            background: var(--card-bg);
            backdrop-filter: var(--blur-effect);
            -webkit-backdrop-filter: var(--blur-effect);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Красивое неоновое превью вместо пустой коробки */
        .poster-placeholder {
            width: 100%;
            height: 140px;
            background: linear-gradient(135deg, #1e1b4b, #0f172a);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .poster-placeholder::before {
            content: '';
            position: absolute;
            width: 80px;
            height: 80px;
            background: #ff416c;
            filter: blur(40px);
            opacity: 0.6;
            border-radius: 50%;
        }

        .poster-title {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 8px;
            text-transform: uppercase;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            z-index: 1;
        }

        .movie-info {
            padding: 16px;
        }

        .movie-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .movie-desc {
            color: var(--text-secondary);
            font-size: 12px;
            line-height: 1.4;
            margin-bottom: 16px;
        }

        /* Элегантный селектор */
        .season-select {
            width: 100%;
            padding: 11px 14px;
            background: rgba(15, 23, 42, 0.6);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 14px;
            outline: none;
            transition: border-color 0.3s, background 0.3s;
            cursor: pointer;
        }

        .season-select:focus {
            border-color: rgba(255, 65, 108, 0.5);
            background: rgba(15, 23, 42, 0.8);
        }

        /* Четкая, аккуратная кнопка с микро-откликом */
        .buy-btn {
            width: 100%;
            padding: 12px;
            background: var(--accent-gradient);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.2, 0, 0.2, 1), box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(255, 65, 108, 0.2);
        }

        .buy-btn:active {
            transform: scale(0.97);
            box-shadow: 0 2px 6px rgba(255, 65, 108, 0.1);
        }

        /* Анимации */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>PRIME CINEMA</h1>
        <p>Эксклюзивные релизы целиком</p>
    </div>

    <div class="catalog">
        
        <div class="movie-card">
            <div class="poster-placeholder">
                <div class="poster-title">Холод</div>
            </div> 
            
            <div class="movie-info">
                <div class="movie-title">Сериал «Холод» (2026)</div>
                <div class="movie-desc">Официально вышла только первая серия, но у нас уже доступен весь сезон целиком в высоком качестве.</div>
                
                <select class="season-select" id="select-kholod">
                    <option value="1 Сезон целиком — 490₽">1 Сезон целиком — 490₽</option>
                    <option value="Только 2 серия — 99₽">Только 2 серия — 99₽</option>
                </select>
                
                <button class="buy-btn" onclick="orderSeries('Холод', 'select-kholod')">Купить доступ</button>
            </div>
        </div>

    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function orderSeries(title, selectId) {
            const selectElement = document.getElementById(selectId);
            const chosenOption = selectElement.value;

            tg.showPopup({
                title: 'Оплата заказа',
                message: `Вы выбрали: "${title}" (${chosenOption}).\n\nДля оплаты картой и получения ссылки вы будете перенаправлены к администратору.`,
                buttons: [
                    {id: 'pay', type: 'default', text: 'Связаться с админом'},
                    {type: 'cancel', text: 'Отмена'}
                ]
            }, function(buttonId) {
                if (buttonId === 'pay') {
                    tg.openTelegramLink('https://t.me/твой_юзернейм_админа');
                    tg.close();
                }
            });
        }
    </script>
</body>
</html>
